# ============================================================
# PLogIt - CI / DevSecOps pipeline.
#
# Designed to be GREEN from day one and light up progressively:
#  - the backend / frontend jobs check whether their code exists in
#    the first step; if not, the job exits cleanly (no failure).
#  - Semgrep (SAST) and Trivy (deps + secrets) run on every push/PR and are
#    BLOCKING - they fail the build on findings.
#
# Security notes:
#  - We install Trivy as a CLI binary directly rather than using
#    aquasecurity/trivy-action, which was compromised in March 2026 (75 version
#    tags force-updated with credential-stealing malware). Installing the binary
#    from the official source avoids the supply-chain risk entirely.
#  - All third-party actions are pinned to full 40-char commit SHAs, not
#    mutable tags like @v4. Mutable tags can be silently repointed by the
#    action owner, enabling supply-chain attacks (same root cause as the
#    trivy-action compromise). SHAs verified via the GitHub API.
#
# Cadence: build -> test -> Semgrep -> Trivy.
# ============================================================
name: CI

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend - Maven build & tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Check backend code exists
        id: check
        run: |
          if [ -f "backend/pom.xml" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Backend code found, continuing."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No backend/pom.xml yet, skipping backend job."
          fi
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        if: steps.check.outputs.exists == 'true'
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Build & test
        if: steps.check.outputs.exists == 'true'
        working-directory: backend
        run: mvn -B verify

  frontend:
    name: Frontend - lint, build, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Check frontend code exists
        id: check
        run: |
          if [ -f "frontend/package.json" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Frontend code found, continuing."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No frontend/package.json yet, skipping frontend job."
          fi
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        if: steps.check.outputs.exists == 'true'
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        if: steps.check.outputs.exists == 'true'
        working-directory: frontend
        run: npm ci
      - name: Lint
        if: steps.check.outputs.exists == 'true'
        working-directory: frontend
        run: npm run lint --if-present
      - name: Build
        if: steps.check.outputs.exists == 'true'
        working-directory: frontend
        run: npm run build
      - name: Test
        if: steps.check.outputs.exists == 'true'
        working-directory: frontend
        run: npm test --if-present

  semgrep:
    name: Semgrep - SAST
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      # --error makes findings fail the build (blocking).
      # --exclude .env.example: .env.example is a template with placeholder
      # values (change-me-*), not real secrets. Scanning it produces only
      # false positives from the p/secrets ruleset.
      - run: semgrep scan --config p/default --config p/owasp-top-ten --config p/secrets --exclude .env.example --error

  trivy:
    name: Trivy - dependencies & secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Install Trivy CLI
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin
          trivy --version
      - name: Set up JDK (for Maven dependency resolution)
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Populate local Maven cache
        working-directory: backend
        run: mvn -B dependency:resolve -DskipTests || true
      - name: Trivy filesystem scan
        run: |
          trivy fs --scanners vuln,secret,misconfig --severity HIGH,CRITICAL --exit-code 1 --ignore-unfixed .
