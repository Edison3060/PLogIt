# ============================================================
# PLogIt - CI / DevSecOps pipeline.
#
# Designed to be GREEN from day one and light up progressively:
#  - the backend / frontend jobs check whether their code exists in
#    the first step; if not, the job exits cleanly (no failure).
#  - Semgrep (SAST) and Trivy (deps + secrets) run on every push/PR and are
#    BLOCKING - they fail the build on findings.
#
# Cadence: build -> test -> Semgrep -> Trivy.
# ============================================================
name: CI

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend - Maven build & tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check backend code exists
        id: check
        run: |
          if [ -f "backend/pom.xml" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Backend code found, continuing."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No backend/pom.xml yet, skipping backend job."
          fi
      - uses: actions/setup-java@v4
        if: steps.check.outputs.exists == 'true'
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Build & test
        if: steps.check.outputs.exists == 'true'
        working-directory: backend
        run: mvn -B verify

  frontend:
    name: Frontend - lint, build, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check frontend code exists
        id: check
        run: |
          if [ -f "frontend/package.json" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Frontend code found, continuing."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No frontend/package.json yet, skipping frontend job."
          fi
      - uses: actions/setup-node@v4
        if: steps.check.outputs.exists == 'true'
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        if: steps.check.outputs.exists == 'true'
        working-directory: frontend
        run: npm ci
      - name: Lint
        if: steps.check.outputs.exists == 'true'
        working-directory: frontend
        run: npm run lint --if-present
      - name: Build
        if: steps.check.outputs.exists == 'true'
        working-directory: frontend
        run: npm run build
      - name: Test
        if: steps.check.outputs.exists == 'true'
        working-directory: frontend
        run: npm test --if-present

  semgrep:
    name: Semgrep - SAST
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      # --error makes findings fail the build (blocking).
      - run: semgrep scan --config p/default --config p/owasp-top-ten --config p/secrets --error

  trivy:
    name: Trivy - dependencies & secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Filesystem scan: dependency CVEs, leaked secrets, IaC misconfig.
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
